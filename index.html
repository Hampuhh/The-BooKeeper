<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f472b6">
    <title>The BooKeeper</title>
    
    <link rel="icon" href="osito.png">
    <link rel="apple-touch-icon" href="osito.png">
    <link rel="manifest" href="manifest.json">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Nunito', 'sans-serif'], 
              fredoka: ['Fredoka', 'sans-serif'],
            }
          }
        }
      }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONOS ORIGINALES (SVGs COMPLETOS) ---
        const IconPlus = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>);
        const IconX = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);
        const IconChevronLeft = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>);
        const IconBookHeart = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path><path d="M16 8.26c-.72-1.3-2.61-1.3-3.33 0l-.67 1.2-.67-1.2c-.72-1.3-2.61-1.3-3.33 0s-.65 2.7.35 4.04l3.65 4.7 3.65-4.7c1-1.34 1.07-2.74.35-4.04z"></path></svg>);
        const IconLibrary = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"></path><path d="M18 14h-8"></path><path d="M15 18h-5"></path><path d="M10 6h8v4h-8V6Z"></path></svg>);
        const IconSparkles = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>);
        const IconCheck = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>);
        const IconEdit2 = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>);
        const IconExternalLink = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>);
        const IconTrash = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>);

        const IMAGEN_OSITO = "osito.png";

        const estadoInicialFormulario = {
          titulo: '', autor: '', genero: '', fechaInicio: '', fechaFin: '', dias: '', formato: 'Físico',
          puntaje: '', estrellas: 3, resena: '', tipo: 'Libro', cita: '', termometro: 3,
          ubicacion: '', reeleria: 'Sí, definitivamente 💕', spicometro: 1,
          plataforma: 'AO3 (Archive of Our Own)', estadoPub: 'En curso', palabras: '', troop: '', link: ''
        };

        function App() {
          const [lecturas, setLecturas] = useState(() => {
            const guardado = localStorage.getItem('theBooKeeper_data');
            return guardado ? JSON.parse(guardado) : [];
          });
          const [metaLectura, setMetaLectura] = useState(() => {
            const metaGuardada = localStorage.getItem('theBooKeeper_meta');
            return metaGuardada ? parseInt(metaGuardada) : 20;
          });
          const [vista, setVista] = useState('lista'); 
          const [lecturaActual, setLecturaActual] = useState(null);
          const [formData, setFormData] = useState(estadoInicialFormulario);
          const [editandoMeta, setEditandoMeta] = useState(false);
          const [mostrarCelebracion, setMostrarCelebracion] = useState(false);
          const [lecturaABorrar, setLecturaABorrar] = useState(null);

          useEffect(() => { localStorage.setItem('theBooKeeper_data', JSON.stringify(lecturas)); }, [lecturas]);
          useEffect(() => { localStorage.setItem('theBooKeeper_meta', metaLectura.toString()); }, [metaLectura]);

          useEffect(() => {
            if (formData.fechaInicio && formData.fechaFin) {
              const inicio = new Date(formData.fechaInicio);
              const fin = new Date(formData.fechaFin);
              const diferenciaTiempo = fin.getTime() - inicio.getTime();
              const diferenciaDias = Math.ceil(diferenciaTiempo / (1000 * 3600 * 24));
              if (diferenciaDias >= 0) setFormData(prev => ({ ...prev, dias: diferenciaDias }));
            }
          }, [formData.fechaInicio, formData.fechaFin]);

          const handleInputChange = (e) => {
            const { name, value } = e.target;
            setFormData(prev => ({ ...prev, [name]: value }));
          };

          const guardarLectura = (e) => {
            e.preventDefault();
            if (formData.id) {
              const nuevasLecturas = lecturas.map(l => l.id === formData.id ? formData : l);
              setLecturas(nuevasLecturas);
              if (lecturaActual && lecturaActual.id === formData.id) setLecturaActual(formData);
            } else {
              const nuevaLectura = { ...formData, id: Date.now() };
              setLecturas([nuevaLectura, ...lecturas]);
            }
            setVista('lista');
            setFormData(estadoInicialFormulario);
            setMostrarCelebracion(true);
            setTimeout(() => setMostrarCelebracion(false), 3500);
          };

          const confirmarEliminar = () => {
            if (lecturaABorrar) {
              setLecturas(lecturas.filter(l => l.id !== lecturaABorrar.id));
              setLecturaABorrar(null);
              setVista('lista');
            }
          };

          const renderizarEstrellas = (cantidad, icono = "⭐") => {
            return Array.from({ length: 5 }).map((_, i) => (
              <span key={i} className={`text-xl ${i < cantidad ? 'opacity-100' : 'opacity-30 grayscale'}`}>{icono}</span>
            ));
          };

          const renderizarTermometro = (valor) => {
            const caritas = ['😱', '😩', '😐', '😊', '😍']; 
            return caritas.map((carita, i) => (
              <span key={i} className={`text-2xl transition-all duration-300 inline-block mx-0.5 ${i + 1 === parseInt(valor || 0) ? 'opacity-100 transform scale-125 drop-shadow-md' : 'opacity-30 grayscale scale-90'}`}>{carita}</span>
            ));
          };

          const renderVistaLista = () => {
            const estiloProgreso = { width: Math.min(100, (lecturas.length / metaLectura) * 100) + '%' };
            return (
              <div className="space-y-6 pb-24">
                <div className="flex flex-col md:flex-row justify-between items-center mb-8 bg-white/60 p-6 rounded-3xl shadow-sm backdrop-blur-md border border-pink-100 gap-4">
                  <div className="w-full md:w-auto">
                    <div className="flex items-end gap-3 mb-2">
                      <img src={IMAGEN_OSITO} alt="Osito" className="w-16 h-16 md:w-20 md:h-20 object-contain drop-shadow-md animate-bounce" style={{animationDuration: '3s'}} />
                      <h1 className="text-3xl font-extrabold text-pink-500 flex items-center gap-2 pb-2 font-fredoka">
                        <IconLibrary size={28} className="text-pink-400" /> The BooKeeper 🌸
                      </h1>
                    </div>
                    <div className="mt-4 bg-white/50 p-4 rounded-2xl border border-pink-50 w-full md:min-w-[300px]">
                      <div className="flex justify-between items-center mb-2">
                        <span className="text-sm font-bold text-gray-500 flex items-center gap-1 font-fredoka">
                          Meta Anual 🎯 {!editandoMeta && <button onClick={() => setEditandoMeta(true)} className="text-pink-400 hover:text-pink-600 ml-1 p-1"><IconEdit2 size={14}/></button>}
                        </span>
                        {editandoMeta ? (
                          <div className="flex items-center gap-2">
                            <input type="number" value={metaLectura} onChange={(e) => setMetaLectura(Math.max(1, parseInt(e.target.value) || 1))} className="w-16 text-center border border-pink-200 rounded-lg text-sm p-1 focus:ring-2 focus:ring-pink-300 outline-none" autoFocus />
                            <button onClick={() => setEditandoMeta(false)} className="text-green-500 hover:text-green-600 bg-green-50 p-1 rounded-md transition-colors"><IconCheck size={16}/></button>
                          </div>
                        ) : <span className="text-sm font-bold text-pink-500 bg-pink-50 px-2 py-1 rounded-md">{lecturas.length} / {metaLectura}</span>}
                      </div>
                      <div className="w-full bg-gray-200 rounded-full h-3 overflow-hidden shadow-inner">
                        <div className="bg-gradient-to-r from-pink-300 to-pink-500 h-3 rounded-full transition-all duration-1000 ease-out" style={estiloProgreso}></div>
                      </div>
                    </div>
                  </div>
                  <button onClick={() => { setFormData(estadoInicialFormulario); setVista('formulario'); }} className="bg-pink-400 hover:bg-pink-500 text-white p-4 rounded-2xl shadow-lg hover:shadow-pink-300/50 transition-all transform hover:-translate-y-1 self-end md:self-auto">
                    <IconPlus size={24} />
                  </button>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                  {lecturas.length === 0 ? (
                    <div className="md:col-span-3 text-center py-20 bg-white/40 rounded-[3rem] border-2 border-dashed border-pink-200">
                      <p className="text-pink-400 font-bold text-xl mb-2 font-fredoka">Tu biblioteca está vacía ✨</p>
                      <p className="text-gray-500">¡Presiona el botón rosa para empezar tu aventura!</p>
                    </div>
                  ) : (
                    lecturas.map(lectura => (
                      <div key={lectura.id} onClick={() => abrirDetalle(lectura)} className="group bg-white/70 hover:bg-white backdrop-blur-sm rounded-3xl p-6 shadow-sm hover:shadow-md border border-pink-100 cursor-pointer transition-all duration-300 transform hover:-translate-y-1">
                        <div className="flex justify-between items-start mb-3">
                          <span className={`px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${lectura.tipo === 'Fanfic' ? 'bg-purple-100 text-purple-600' : 'bg-green-100 text-green-600'}`}>{lectura.tipo}</span>
                          <span className="flex">{renderizarEstrellas(lectura.estrellas)}</span>
                        </div>
                        <h3 className="text-xl font-bold text-gray-800 mb-1 line-clamp-2 font-fredoka">{lectura.titulo}</h3>
                        <p className="text-gray-500 text-sm mb-4 font-sans italic">👤 {lectura.autor}</p>
                        <div className="flex flex-wrap gap-2 text-xs text-gray-600 font-sans">
                          <span className="bg-pink-50 px-2 py-1 rounded-lg border border-pink-100">📑 {lectura.genero}</span>
                          <span className="bg-pink-50 px-2 py-1 rounded-lg border border-pink-100">✨ {lectura.puntaje}/10</span>
                        </div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            );
          };

          const renderVistaDetalle = () => {
            if (!lecturaActual) return null;
            const itemStyle = "flex justify-between items-center text-sm py-2 border-b border-pink-50 last:border-0";
            return (
              <div className="max-w-3xl mx-auto pb-12 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div className="flex justify-between items-center mb-6">
                  <button onClick={() => setVista('lista')} className="flex items-center text-pink-500 hover:text-pink-600 font-medium bg-white/50 px-4 py-2 rounded-full backdrop-blur-sm transition-colors shadow-sm font-fredoka">
                    <IconChevronLeft size={20} className="mr-1" /> Volver a la biblioteca
                  </button>
                  <div className="flex gap-2">
                    <button onClick={() => setLecturaABorrar(lecturaActual)} className="flex items-center gap-2 text-rose-400 hover:text-white font-bold bg-rose-50 hover:bg-rose-400 px-4 py-2 rounded-full backdrop-blur-sm transition-all shadow-sm"><IconTrash size={16} /></button>
                    <button onClick={() => { setFormData(lecturaActual); setVista('formulario'); }} className="flex items-center gap-2 text-pink-500 hover:text-white font-bold bg-pink-100 hover:bg-pink-400 px-5 py-2 rounded-full backdrop-blur-sm transition-all shadow-sm font-fredoka"><IconEdit2 size={16} /> Editar</button>
                  </div>
                </div>

                <div className="bg-white/80 backdrop-blur-md rounded-[2.5rem] p-8 md:p-10 shadow-xl shadow-pink-100/50 border border-pink-100 relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-64 h-64 bg-gradient-to-br from-pink-200/40 to-purple-200/40 rounded-full blur-3xl -mr-20 -mt-20 z-0"></div>
                  <div className="relative z-10">
                    <div className="flex flex-col md:flex-row gap-6 items-start mb-8">
                      <div className="w-24 h-32 bg-gradient-to-br from-pink-300 to-purple-300 rounded-2xl shadow-md flex items-center justify-center flex-shrink-0 transform -rotate-3 border-4 border-white">
                        <IconBookHeart size={40} className="text-white opacity-80" />
                      </div>
                      <div>
                        <span className={`inline-block px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-2 ${lecturaActual.tipo === 'Fanfic' ? 'bg-purple-100 text-purple-600' : 'bg-green-100 text-green-600'}`}>🎓 {lecturaActual.tipo}</span>
                        <h2 className="text-3xl md:text-4xl font-extrabold text-gray-800 mb-2 font-fredoka">{lecturaActual.titulo}</h2>
                        <p className="text-xl text-gray-500 font-medium font-fredoka italic">👤 {lecturaActual.autor}</p>
                        {lecturaActual.link && <a href={lecturaActual.link} target="_blank" className="inline-flex items-center gap-1 mt-3 text-sm font-semibold text-blue-500 hover:text-blue-600 bg-blue-50 px-3 py-1.5 rounded-full transition-colors border border-blue-100"><IconExternalLink size={14} /> Leer historia original</a>}
                      </div>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                      <div className="bg-pink-50 rounded-2xl p-4 border border-pink-100 text-center"><p className="text-xs text-pink-400 font-bold uppercase mb-1 font-fredoka">⭐ Estrellas</p><div className="flex justify-center">{renderizarEstrellas(lecturaActual.estrellas)}</div></div>
                      <div className="bg-pink-50 rounded-2xl p-4 border border-pink-100 text-center"><p className="text-xs text-pink-400 font-bold uppercase mb-1 font-fredoka">✨ Puntaje</p><p className="text-xl font-bold text-gray-700">{lecturaActual.puntaje}</p></div>
                      <div className="bg-pink-50 rounded-2xl p-4 border border-pink-100 text-center"><p className="text-xs text-pink-400 font-bold uppercase mb-1 font-fredoka">🌡️ Termómetro</p><div className="flex justify-center h-8 mt-1">{renderizarTermometro(lecturaActual.termometro)}</div></div>
                      <div className="bg-pink-50 rounded-2xl p-4 border border-pink-100 text-center"><p className="text-xs text-pink-400 font-bold uppercase mb-1 font-fredoka">🌶️ Spice</p><div className="flex justify-center">{renderizarEstrellas(lecturaActual.spicometro, "🌶️")}</div></div>
                    </div>

                    {lecturaActual.cita && (
                      <div className="bg-gradient-to-r from-pink-100/50 to-purple-100/50 rounded-2xl p-6 mb-8 relative">
                        <span className="text-4xl absolute top-2 left-4 opacity-20">"</span>
                        <p className="text-gray-700 font-medium text-lg italic text-center px-6">"{lecturaActual.cita}"</p>
                        <p className="text-right text-xs text-pink-400 font-bold uppercase mt-2 font-fredoka">✒️ Mejor Cita</p>
                      </div>
                    )}

                    <div className="space-y-6">
                      <div>
                        <h3 className="text-sm font-bold text-pink-400 uppercase tracking-wider mb-2 flex items-center gap-2 font-fredoka"><IconSparkles size={16} className="text-pink-400" /> Reseña</h3>
                        <p className="text-gray-700 bg-white/50 p-5 rounded-2xl border border-pink-50 leading-relaxed italic">{lecturaActual.resena || "Sin reseña todavía... 🍵"}</p>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white/50 p-5 rounded-2xl border border-pink-50 space-y-1">
                          <h3 className="text-sm font-bold text-gray-400 uppercase mb-2 border-b border-pink-100 pb-2 font-fredoka text-[10px] tracking-widest">Detalles Generales</h3>
                          <div className={itemStyle}><span className="text-gray-500">📑 Género:</span> <span className="font-bold text-gray-700">{lecturaActual.genero}</span></div>
                          <div className={itemStyle}><span className="text-gray-500">📱 Formato:</span> <span className="font-bold text-gray-700">{lecturaActual.formato}</span></div>
                          <div className={itemStyle}><span className="text-gray-500">🌍 Ubicación:</span> <span className="font-bold text-gray-700">{lecturaActual.ubicacion}</span></div>
                          <div className={itemStyle}><span className="text-gray-500">🔁 ¿Reelería?:</span> <span className="font-bold text-gray-700">{lecturaActual.reeleria}</span></div>
                        </div>
                        <div className="bg-white/50 p-5 rounded-2xl border border-pink-50 space-y-1">
                          <h3 className="text-sm font-bold text-gray-400 uppercase mb-2 border-b border-pink-100 pb-2 font-fredoka text-[10px] tracking-widest">Tiempos</h3>
                          <div className={itemStyle}><span className="text-gray-500">📅 Inicio:</span> <span className="font-bold text-gray-700">{lecturaActual.fechaInicio}</span></div>
                          <div className={itemStyle}><span className="text-gray-500">🏁 Fin:</span> <span className="font-bold text-gray-700">{lecturaActual.fechaFin}</span></div>
                          <div className={itemStyle}><span className="text-gray-500">⏳ Total días:</span> <span className="font-bold bg-pink-100 text-pink-600 px-2 rounded-md">{lecturaActual.dias}</span></div>
                        </div>
                      </div>

                      {lecturaActual.tipo === 'Fanfic' && (
                        <div className="bg-purple-50/50 p-5 rounded-2xl border border-purple-100 mt-6">
                          <h3 className="text-[10px] font-bold text-purple-400 uppercase tracking-widest mb-2 border-b border-purple-100 pb-2 font-fredoka flex items-center gap-2"><IconBookHeart size={14}/> Detalles de Fanfic</h3>
                          <div className="grid grid-cols-2 gap-4">
                            <p className="text-gray-700 text-sm"><span>🌐 Plataforma:</span> <br/><span className="font-bold">{lecturaActual.plataforma}</span></p>
                            <p className="text-gray-700 text-sm"><span>📊 Estado:</span> <br/><span className="font-bold">{lecturaActual.estadoPub}</span></p>
                            <p className="text-gray-700 text-sm"><span>✂️ Palabras:</span> <br/><span className="font-bold">{lecturaActual.palabras}</span></p>
                            <p className="text-gray-700 text-sm"><span>🎭 Troop:</span> <br/><span className="font-bold">{lecturaActual.troop}</span></p>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            );
          };

          const renderVistaFormulario = () => {
            const inputStyle = "w-full bg-white/60 border border-pink-200 rounded-xl px-4 py-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-pink-400 focus:bg-white transition-all shadow-sm font-sans";
            const dateInputStyle = "w-full bg-white/60 border border-pink-200 rounded-xl px-2 py-3 text-gray-700 text-xs focus:outline-none focus:ring-2 focus:ring-pink-400 focus:bg-white transition-all shadow-sm font-sans";
            const labelStyle = "block text-sm font-bold text-gray-600 mb-1 ml-1 font-fredoka";
            return (
              <div className="max-w-3xl mx-auto pb-12 animate-in fade-in slide-in-from-bottom-8 duration-500">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-3xl font-extrabold text-pink-500 flex items-center gap-2 font-fredoka">
                    <IconSparkles size={28} className="text-pink-400" /> {formData.id ? 'Editando Aventura 🍡' : 'Set? Ready...Go! 🍡'}
                  </h2>
                  <button onClick={() => setVista('lista')} className="bg-white p-2 rounded-full text-pink-400 hover:text-pink-600 shadow-sm"><IconX size={24}/></button>
                </div>

                <form onSubmit={guardarLectura} className="bg-white/80 backdrop-blur-md rounded-[2.5rem] p-8 md:p-10 shadow-xl shadow-pink-100/50 border border-pink-100 space-y-8">
                  <div className="space-y-4">
                    <h3 className="text-lg font-bold text-pink-400 border-b border-pink-100 pb-2 font-fredoka">Datos Principales 🌸</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div><label className={labelStyle}>📖 Título</label><input required name="titulo" value={formData.titulo} onChange={handleInputChange} className={inputStyle} placeholder="El increíble castillo vagabundo..." /></div>
                      <div><label className={labelStyle}>👤 Autor/a</label><input required name="autor" value={formData.autor} onChange={handleInputChange} className={inputStyle} placeholder="Diana Wynne Jones" /></div>
                      <div>
                        <label className={labelStyle}>🎓 Tipo</label>
                        <select name="tipo" value={formData.tipo} onChange={handleInputChange} className={inputStyle}>
                          <option value="Libro">Libro 📚</option><option value="Manga">Manga 🎎</option><option value="Cómic">Cómic 🦸</option><option value="Fanfic">Fanfic 💻</option><option value="AudioLibro">Audiolibro 🎧</option>
                        </select>
                      </div>
                      <div><label className={labelStyle}>📑 Género</label><input name="genero" value={formData.genero} onChange={handleInputChange} className={inputStyle} placeholder="Fantasía, Romance..." /></div>
                      <div>
                        <label className={labelStyle}>📱 Formato</label>
                        <select name="formato" value={formData.formato} onChange={handleInputChange} className={inputStyle}>
                          <option>Físico</option><option>Digital (Kindle/PDF)</option><option>Web</option><option>Audio</option>
                        </select>
                      </div>
                      <div className="md:col-span-2"><label className={labelStyle}>🔗 Link (Opcional)</label><input type="url" name="link" value={formData.link} onChange={handleInputChange} className={inputStyle} placeholder="https://..." /></div>
                    </div>
                  </div>

                  {formData.tipo === 'Fanfic' && (
                    <div className="bg-purple-50 p-6 rounded-3xl border border-purple-200 space-y-4 animate-in zoom-in-95 duration-300">
                      <h3 className="text-lg font-bold text-purple-500 border-b border-purple-200 pb-2 font-fredoka flex items-center gap-2"><IconBookHeart size={20}/> Zona Exclusiva Fanfics 💜</h3>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                          <label className="block text-sm font-bold text-purple-700 mb-1 ml-1 font-fredoka">🌐 Plataforma</label>
                          <select name="plataforma" value={formData.plataforma} onChange={handleInputChange} className={inputStyle.replace('pink', 'purple')}>
                            <option>AO3 (Archive of Our Own)</option><option>Wattpad</option><option>Fanfiction.net</option><option>Twitter/X AU</option><option>Otro</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-purple-700 mb-1 ml-1 font-fredoka">📊 Estado</label>
                          <select name="estadoPub" value={formData.estadoPub} onChange={handleInputChange} className={inputStyle.replace('pink', 'purple')}>
                            <option>Terminado</option><option>En curso</option><option>Abandonado</option><option>Hiatus</option>
                          </select>
                        </div>
                        <div><label className="block text-sm font-bold text-purple-700 mb-1 ml-1 font-fredoka">✂️ Palabras</label><input type="number" name="palabras" value={formData.palabras} onChange={handleInputChange} className={inputStyle.replace('pink', 'purple')} placeholder="50000" /></div>
                        <div><label className="block text-sm font-bold text-purple-700 mb-1 ml-1 font-fredoka">🎭 Troop</label><input name="troop" value={formData.troop} onChange={handleInputChange} className={inputStyle.replace('pink', 'purple')} placeholder="Enemies to Lovers" /></div>
                      </div>
                    </div>
                  )}

                  <div className="space-y-4 bg-white/40 p-6 rounded-3xl border border-pink-100">
                    <h3 className="text-sm font-bold text-pink-400 italic font-sans">"Books break the shackles of time—proof that humans can work magic" ⏱️</h3>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      <div><label className={labelStyle}>📅 Fecha Inicio</label><input type="date" name="fechaInicio" value={formData.fechaInicio} onChange={handleInputChange} className={dateInputStyle} /></div>
                      <div><label className={labelStyle}>🏁 Fecha Fin</label><input type="date" name="fechaFin" value={formData.fechaFin} onChange={handleInputChange} className={dateInputStyle} /></div>
                      <div><label className={labelStyle}>⏳ Días (Auto)</label><input readOnly value={formData.dias} className={`${dateInputStyle} bg-pink-50/50 text-pink-600 font-bold`} /></div>
                    </div>
                  </div>

                  <div className="space-y-4">
                    <h3 className="text-lg font-bold text-pink-400 border-b border-pink-100 pb-2 font-fredoka">Tu Veredicto ✨</h3>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                      <div className="text-center"><label className={labelStyle}>⭐ Estrellas</label><input type="range" min="1" max="5" name="estrellas" value={formData.estrellas} onChange={handleInputChange} className="w-full accent-yellow-400" /><div className="mt-1">{renderizarEstrellas(formData.estrellas)}</div></div>
                      <div className="text-center"><label className={labelStyle}>🌡️ Sentir</label><input type="range" min="1" max="5" name="termometro" value={formData.termometro} onChange={handleInputChange} className="w-full accent-pink-400" /><div className="mt-1">{renderizarTermometro(formData.termometro)}</div></div>
                      <div className="text-center"><label className={labelStyle}>🌶️ Spice</label><input type="range" min="1" max="5" name="spicometro" value={formData.spicometro} onChange={handleInputChange} className="w-full accent-red-500" /><div className="mt-1">{renderizarEstrellas(formData.spicometro, "🌶️")}</div></div>
                      <div><label className={labelStyle}>✨ Puntaje</label><input type="number" step="0.1" name="puntaje" value={formData.puntaje} onChange={handleInputChange} className={inputStyle} placeholder="Ej: 8.5" /></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                      <div><label className={labelStyle}>🌍 Ubicación</label><input name="ubicacion" value={formData.ubicacion} onChange={handleInputChange} className={inputStyle} placeholder="Tokio, Hogwarts..." /></div>
                      <div>
                        <label className={labelStyle}>🔁 ¿Reelería?</label>
                        <select name="reeleria" value={formData.reeleria} onChange={handleInputChange} className={inputStyle}>
                          <option>Sí, definitivamente 💕</option><option>Tal vez 🤔</option><option>Solo partes 📖</option><option>No 🚫</option>
                        </select>
                      </div>
                    </div>
                    <div><label className={labelStyle}>Mejor Cita ✒️</label><textarea name="cita" value={formData.cita} onChange={handleInputChange} rows="2" className={inputStyle} placeholder="Esa frase mágica..."></textarea></div>
                    <div><label className={labelStyle}>✍️ Reseña</label><textarea name="resena" value={formData.resena} onChange={handleInputChange} rows="3" className={inputStyle}></textarea></div>
                  </div>

                  <div className="pt-6">
                    <button type="submit" className="w-full bg-gradient-to-r from-pink-400 to-rose-400 text-white font-bold py-4 rounded-2xl shadow-lg transform hover:-translate-y-1 text-xl font-fredoka">
                      {formData.id ? 'Actualizar Aventura ✨' : '¡Anotar en mi Biblioteca! ✨'}
                    </button>
                  </div>
                </form>
              </div>
            );
          };

          return (
            <div className="min-h-screen bg-fixed bg-[#fff5f7] bg-[radial-gradient(#ffd1dc_1px,transparent_1px)] [background-size:20px_20px] font-sans text-slate-700 selection:bg-pink-200">
              {mostrarCelebracion && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-white/50 backdrop-blur-sm animate-in fade-in duration-300">
                  <div className="bg-white p-10 rounded-[3rem] shadow-2xl border-4 border-pink-200 text-center animate-in zoom-in-50 bounce transform scale-110">
                    <div className="text-6xl mb-4 animate-bounce">🎉🌸📚</div>
                    <h2 className="text-3xl font-extrabold text-pink-500 font-fredoka">¡Aventura Guardada!</h2>
                    <p className="text-pink-400 font-bold bg-pink-50 px-4 py-1 rounded-full mt-2">Tu biblioteca sigue creciendo ✨</p>
                  </div>
                </div>
              )}
              {lecturaABorrar && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/40 backdrop-blur-sm animate-in fade-in duration-200">
                  <div className="bg-white p-8 rounded-[2rem] shadow-2xl border-4 border-rose-100 max-w-sm w-full mx-4 text-center transform animate-in zoom-in-95">
                    <div className="w-16 h-16 bg-rose-50 text-rose-400 rounded-full flex items-center justify-center mb-4 mx-auto"><IconTrash size={32} /></div>
                    <h3 className="text-2xl font-bold mb-2 font-fredoka">¿Borrar recuerdo? 🥺</h3>
                    <p className="text-gray-600 mb-6 font-sans">Esta acción no se puede deshacer.</p>
                    <div className="flex gap-3">
                      <button onClick={() => setLecturaABorrar(null)} className="flex-1 bg-gray-100 py-3 rounded-xl font-bold font-sans">Cancelar</button>
                      <button onClick={confirmarEliminar} className="flex-1 bg-rose-400 text-white py-3 rounded-xl font-bold font-sans">Sí, borrar</button>
                    </div>
                  </div>
                </div>
              )}
              <div className="max-w-6xl mx-auto px-4 py-8 md:py-12 relative z-10 font-sans">
                {vista === 'lista' && renderVistaLista()}
                {vista === 'formulario' && renderVistaFormulario()}
                {vista === 'detalle' && renderVistaDetalle()}
              </div>
            </div>
          );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').then(reg => console.log('SW OK')).catch(err => console.log('SW ERR'));
        });
      }
    </script>
</body>
</html>
