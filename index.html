<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f472b6">
  <title>The BooKeeper</title>

  <link rel="icon" href="osito.png">
  <link rel="apple-touch-icon" href="osito.png">
  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Nunito', 'sans-serif'],
            fredoka: ['Fredoka', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="antialiased">
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect } = React;

  // --- ÍCONOS ---
  const IconPlus = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>);
  const IconX = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);
  const IconChevronLeft = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>);
  const IconLibrary = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"></path><path d="M18 14h-8"></path><path d="M15 18h-5"></path><path d="M10 6h8v4h-8V6Z"></path></svg>);
  const IconSparkles = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>);
  const IconCheck = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>);
  const IconEdit2 = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>);
  const IconTrash = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>);

  const IMAGEN_OSITO = "osito.png";

  const estadoInicialFormulario = {
    titulo: '', autor: '', genero: '', fechaInicio: '', fechaFin: '', dias: '', formato: 'Físico',
    puntaje: '', estrellas: 3, resena: '', tipo: 'Libro', cita: '', termometro: 3,
    ubicacion: '', reeleria: 'Sí', spicometro: 1,
    plataforma: 'AO3', estadoPub: 'En curso', palabras: '', troop: '', link: ''
  };

  function App() {
    const [lecturas, setLecturas] = useState(() => {
      const guardado = localStorage.getItem('theBooKeeper_data');
      return guardado ? JSON.parse(guardado) : [];
    });

    const [metaLectura, setMetaLectura] = useState(() => {
      const metaGuardada = localStorage.getItem('theBooKeeper_meta');
      return metaGuardada ? parseInt(metaGuardada) : 20;
    });

    const [vista, setVista] = useState('lista');
    const [lecturaActual, setLecturaActual] = useState(null);
    const [formData, setFormData] = useState(estadoInicialFormulario);
    const [editandoMeta, setEditandoMeta] = useState(false);
    const [mostrarCelebracion, setMostrarCelebracion] = useState(false);
    const [lecturaABorrar, setLecturaABorrar] = useState(null);

    useEffect(() => {
      localStorage.setItem('theBooKeeper_data', JSON.stringify(lecturas));
    }, [lecturas]);

    useEffect(() => {
      localStorage.setItem('theBooKeeper_meta', metaLectura.toString());
    }, [metaLectura]);

    useEffect(() => {
      if (formData.fechaInicio && formData.fechaFin) {
        const inicio = new Date(formData.fechaInicio);
        const fin = new Date(formData.fechaFin);
        const diferenciaTiempo = fin.getTime() - inicio.getTime();
        const diferenciaDias = Math.ceil(diferenciaTiempo / (1000 * 3600 * 24));
        if (diferenciaDias >= 0) {
          setFormData(prev => ({ ...prev, dias: diferenciaDias }));
        }
      }
    }, [formData.fechaInicio, formData.fechaFin]);

    const handleInputChange = (e) => {
      const { name, value } = e.target;
      setFormData(prev => ({ ...prev, [name]: value }));
    };

    const guardarLectura = (e) => {
      e.preventDefault();

      if (formData.id) {
        const nuevasLecturas = lecturas.map(l => l.id === formData.id ? formData : l);
        setLecturas(nuevasLecturas);
        if (lecturaActual && lecturaActual.id === formData.id) {
          setLecturaActual(formData);
        }
      } else {
        const nuevaLectura = { ...formData, id: Date.now() };
        setLecturas([nuevaLectura, ...lecturas]);
      }

      setVista('lista');
      setFormData(estadoInicialFormulario);
      setMostrarCelebracion(true);
      setTimeout(() => setMostrarCelebracion(false), 3500);
    };

    const confirmarEliminar = () => {
      if (lecturaABorrar) {
        setLecturas(lecturas.filter(l => l.id !== lecturaABorrar.id));
        setLecturaABorrar(null);
        setVista('lista');
      }
    };

    const abrirDetalle = (lectura) => {
      setLecturaActual(lectura);
      setVista('detalle');
    };

    const renderizarEstrellas = (cantidad, icono = "⭐") => {
      return Array.from({ length: 5 }).map((_, i) => (
        <span key={i} className={`text-xl ${i < cantidad ? 'opacity-100' : 'opacity-30 grayscale'}`}>
          {icono}
        </span>
      ));
    };

    const renderizarTermometro = (valor) => {
      const caritas = ['😱', '😩', '😐', '😊', '😍']; // ✅ cambio: carita con corazones
      return caritas.map((carita, i) => (
        <span
          key={i}
          className={`text-2xl transition-all duration-300 inline-block mx-0.5 ${
            i + 1 === parseInt(valor || 0)
              ? 'opacity-100 transform scale-125 drop-shadow-md'
              : 'opacity-30 grayscale scale-90'
          }`}
        >
          {carita}
        </span>
      ));
    };

    const renderVistaLista = () => {
      const estiloOsito = { animationDuration: '3s' };
      const estiloProgreso = { width: Math.min(100, (lecturas.length / metaLectura) * 100) + '%' };

      return (
        <div className="space-y-6 pb-24">
          <div className="flex flex-col md:flex-row justify-between items-center mb-8 bg-white/60 p-6 rounded-3xl shadow-sm backdrop-blur-md border border-pink-100 gap-4">
            <div className="w-full md:w-auto">
              <div className="flex items-end gap-3 mb-2">
                <img
                  src={IMAGEN_OSITO}
                  alt="Osito Lector"
                  className="w-16 h-16 md:w-20 md:h-20 object-contain drop-shadow-md animate-bounce"
                  style={estiloOsito}
                  onError={(e) => { e.target.style.display = 'none'; }}
                />
                <h1 className="text-3xl font-extrabold text-pink-500 flex items-center gap-2 pb-2 font-fredoka">
                  <IconLibrary size={28} className="text-pink-400" /> The BooKeeper 🌸
                </h1>
              </div>

              <div className="mt-4 bg-white/50 p-4 rounded-2xl border border-pink-50 w-full md:min-w-[300px]">
                <div className="flex justify-between items-center mb-2">
                  <span className="text-sm font-bold text-gray-500 flex items-center gap-1 font-fredoka">
                    Meta Anual 🎯
                    {!editandoMeta && (
                      <button onClick={() => setEditandoMeta(true)} className="text-pink-400 hover:text-pink-600 ml-1 p-1">
                        <IconEdit2 size={14} />
                      </button>
                    )}
                  </span>

                  {editandoMeta ? (
                    <div className="flex items-center gap-2">
                      <input
                        type="number"
                        value={metaLectura}
                        onChange={(e) => setMetaLectura(Math.max(1, parseInt(e.target.value) || 1))}
                        className="w-16 text-center border border-pink-200 rounded-lg text-sm p-1 focus:ring-2 focus:ring-pink-300 outline-none"
                        autoFocus
                      />
                      <button onClick={() => setEditandoMeta(false)} className="text-green-500 hover:text-green-600 bg-green-50 p-1 rounded-md transition-colors">
                        <IconCheck size={16} />
                      </button>
                    </div>
                  ) : (
                    <span className="text-sm font-bold text-pink-500 bg-pink-50 px-2 py-1 rounded-md">{lecturas.length} / {metaLectura}</span>
                  )}
                </div>

                <div className="w-full bg-gray-200 rounded-full h-3 overflow-hidden shadow-inner">
                  <div
                    className="bg-gradient-to-r from-pink-300 to-pink-500 h-3 rounded-full transition-all duration-1000 ease-out"
                    style={estiloProgreso}
                  ></div>
                </div>
              </div>
            </div>

            <button
              onClick={() => { setFormData(estadoInicialFormulario); setVista('formulario'); }}
              className="bg-pink-400 hover:bg-pink-500 text-white p-4 rounded-2xl shadow-lg hover:shadow-pink-300/50 transition-all transform hover:-translate-y-1 self-end md:self-auto"
            >
              <IconPlus size={24} />
            </button>
          </div>

          {lecturas.length === 0 ? (
            <div className="text-center py-20 bg-white/40 rounded-[3rem] border-2 border-dashed border-pink-200">
              <p className="text-pink-400 font-bold text-xl mb-2 font-fredoka">Tu biblioteca está vacía ✨</p>
              <p className="text-gray-500">Set? Ready...Go!</p>
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              {lecturas.map(lectura => (
                <div
                  key={lectura.id}
                  onClick={() => abrirDetalle(lectura)}
                  className="group bg-white/70 hover:bg-white backdrop-blur-sm rounded-3xl p-6 shadow-sm hover:shadow-md border border-pink-100 cursor-pointer transition-all duration-300 transform hover:-translate-y-1"
                >
                  <div className="flex justify-between items-start mb-3">
                    <span className={`px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${
                      lectura.tipo === 'Fanfic' ? 'bg-purple-100 text-purple-600' : 'bg-green-100 text-green-600'
                    }`}>
                      {lectura.tipo}
                    </span>
                    <span className="flex">{renderizarEstrellas(lectura.estrellas)}</span>
                  </div>
                  <h3 className="text-xl font-bold text-gray-800 mb-1 line-clamp-2 font-fredoka">{lectura.titulo}</h3>
                  <p className="text-gray-500 text-sm mb-4">👤 {lectura.autor}</p>
                  <div className="flex flex-wrap gap-2 text-xs text-gray-600 font-sans">
                    <span className="bg-pink-50 px-2 py-1 rounded-lg border border-pink-100">📑 {lectura.genero}</span>
                    <span className="bg-pink-50 px-2 py-1 rounded-lg border border-pink-100">✨ {lectura.puntaje}/10</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    };

    const renderVistaDetalle = () => {
      if (!lecturaActual) return null;
      return (
        <div className="max-w-3xl mx-auto pb-12 animate-in fade-in slide-in-from-bottom-4 duration-500">
          <div className="flex justify-between items-center mb-6">
            <button
              onClick={() => setVista('lista')}
              className="flex items-center text-pink-500 hover:text-pink-600 font-medium bg-white/50 px-4 py-2 rounded-full backdrop-blur-sm transition-colors shadow-sm font-fredoka"
            >
              <IconChevronLeft size={20} className="mr-1" /> Volver
            </button>

            <div className="flex gap-2">
              <button onClick={() => setLecturaABorrar(lecturaActual)} className="bg-rose-50 text-rose-400 p-2 rounded-full hover:bg-rose-400 hover:text-white transition-all">
                <IconTrash size={20} />
              </button>
              <button onClick={() => { setFormData(lecturaActual); setVista('formulario'); }} className="bg-pink-100 text-pink-500 p-2 rounded-full hover:bg-pink-400 hover:text-white transition-all">
                <IconEdit2 size={20} />
              </button>
            </div>
          </div>

          <div className="bg-white/80 backdrop-blur-md rounded-[2.5rem] p-8 md:p-10 shadow-xl border border-pink-100">
            <h2 className="text-3xl md:text-4xl font-extrabold text-gray-800 mb-2 font-fredoka">{lecturaActual.titulo}</h2>
            <p className="text-xl text-gray-500 font-medium mb-6 font-fredoka">👤 {lecturaActual.autor}</p>

            {/* ✅ Detalles generales parejos */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 items-stretch">
              <div className="bg-pink-50 rounded-2xl p-4 border border-pink-100 text-center flex flex-col justify-between min-h-[110px]">
                <p className="text-xs text-pink-400 font-bold uppercase mb-2 leading-tight">⭐ Estrellas</p>
                <div className="flex justify-center">{renderizarEstrellas(lecturaActual.estrellas)}</div>
              </div>

              <div className="bg-pink-50 rounded-2xl p-4 border border-pink-100 text-center flex flex-col justify-between min-h-[110px]">
                <p className="text-xs text-pink-400 font-bold uppercase mb-2 leading-tight font-fredoka">✨ Puntaje</p>
                <p className="text-xl font-bold text-gray-700 leading-none">{lecturaActual.puntaje}</p>
              </div>

              <div className="bg-pink-50 rounded-2xl p-4 border border-pink-100 text-center flex flex-col justify-between min-h-[110px]">
                <p className="text-xs text-pink-400 font-bold uppercase mb-2 leading-tight">🌡️ Sentir</p>
                <div className="flex justify-center items-center h-8">{renderizarTermometro(lecturaActual.termometro)}</div>
              </div>

              <div className="bg-pink-50 rounded-2xl p-4 border border-pink-100 text-center flex flex-col justify-between min-h-[110px]">
                <p className="text-xs text-pink-400 font-bold uppercase mb-2 leading-tight">🌶️ Spice</p>
                <div className="flex justify-center">{renderizarEstrellas(lecturaActual.spicometro, "🌶️")}</div>
              </div>
            </div>

            {/* ✅ Reseña con destello en color */}
            {lecturaActual.resena && (
              <div className="bg-white/50 p-6 rounded-3xl border border-pink-50 italic text-gray-700 leading-relaxed">
                <div className="flex items-center gap-2 mb-3 not-italic">
                  <span className="text-yellow-400 drop-shadow-sm">✨</span>
                  <span className="font-bold text-pink-500 font-fredoka">Reseña</span>
                </div>
                {lecturaActual.resena}
              </div>
            )}

            {/* ✅ Mejor Cita (si existe) */}
            {lecturaActual.cita && (
              <div className="mt-6 bg-white/50 p-6 rounded-3xl border border-pink-50 text-gray-700">
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-pink-400">💬</span>
                  <span className="font-bold text-pink-500 font-fredoka">Mejor Cita</span>
                </div>
                <p className="italic leading-relaxed">“{lecturaActual.cita}”</p>
              </div>
            )}
          </div>
        </div>
      );
    };

    const renderVistaFormulario = () => {
      // ✅ input arreglado (incluye date) para que no se salga del cuadro
      const inputStyle =
        "w-full bg-white/60 border border-pink-200 rounded-xl px-4 py-3 h-12 " +
        "text-[16px] leading-tight text-gray-700 appearance-none " +
        "focus:outline-none focus:ring-2 focus:ring-pink-400 focus:bg-white transition-all shadow-sm";

      const labelStyle = "block text-sm font-bold text-gray-600 mb-1 ml-1 font-fredoka";
      const cardStyle = "bg-white/60 border border-pink-100 rounded-2xl p-5 md:p-6";

      return (
        <div className="max-w-3xl mx-auto pb-12 animate-in fade-in slide-in-from-bottom-8 duration-500">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-3xl font-extrabold text-pink-500 flex items-center gap-2 font-fredoka">
              <IconSparkles size={28} className="text-pink-400" /> {formData.id ? 'Editar' : 'Nueva Lectura'}
            </h2>
            <button onClick={() => setVista('lista')} className="bg-white p-2 rounded-full text-pink-400 shadow-sm">
              <IconX size={24} />
            </button>
          </div>

          <form onSubmit={guardarLectura} className="bg-white/80 backdrop-blur-md rounded-[2.5rem] p-8 md:p-10 shadow-xl border border-pink-100 space-y-6">

            {/* ✅ CATEGORÍA: Identidad */}
            <div className={cardStyle}>
              <h3 className="text-lg font-extrabold text-pink-500 mb-4 font-fredoka">📌 Identidad</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label className={labelStyle}>📖 Título</label>
                  <input required type="text" name="titulo" value={formData.titulo} onChange={handleInputChange} className={inputStyle} />
                </div>
                <div>
                  <label className={labelStyle}>👤 Autor</label>
                  <input required type="text" name="autor" value={formData.autor} onChange={handleInputChange} className={inputStyle} />
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
                <div>
                  <label className={labelStyle}>🏷️ Tipo</label>
                  <select name="tipo" value={formData.tipo} onChange={handleInputChange} className={inputStyle}>
                    <option value="Libro">Libro</option>
                    <option value="Fanfic">Fanfic</option>
                  </select>
                </div>
                <div>
                  <label className={labelStyle}>📑 Género</label>
                  <input type="text" name="genero" value={formData.genero} onChange={handleInputChange} className={inputStyle} placeholder="Ej: Fantasía, Romance..." />
                </div>
                <div>
                  <label className={labelStyle}>📦 Formato</label>
                  <select name="formato" value={formData.formato} onChange={handleInputChange} className={inputStyle}>
                    <option value="Físico">Físico</option>
                    <option value="Digital">Digital</option>
                    <option value="Audiolibro">Audiolibro</option>
                  </select>
                </div>
              </div>
            </div>

            {/* ✅ CATEGORÍA: Fechas */}
            <div className={cardStyle}>
              <h3 className="text-lg font-extrabold text-pink-500 mb-4 font-fredoka">🗓️ Fechas</h3>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                  <label className={labelStyle}>📅 Inicio</label>
                  <input type="date" name="fechaInicio" value={formData.fechaInicio} onChange={handleInputChange} className={inputStyle} />
                </div>
                <div>
                  <label className={labelStyle}>🏁 Fin</label>
                  <input type="date" name="fechaFin" value={formData.fechaFin} onChange={handleInputChange} className={inputStyle} />
                </div>
                <div>
                  <label className={labelStyle}>⏳ Días</label>
                  <input type="number" name="dias" value={formData.dias} onChange={handleInputChange} className={inputStyle} placeholder="Auto" />
                </div>
              </div>
            </div>

            {/* ✅ CATEGORÍA: Ratings */}
            <div className={cardStyle}>
              <h3 className="text-lg font-extrabold text-pink-500 mb-4 font-fredoka">⭐ Ratings</h3>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label className={labelStyle}>✨ Puntaje (0–10)</label>
                  <input type="number" min="0" max="10" name="puntaje" value={formData.puntaje} onChange={handleInputChange} className={inputStyle} />
                </div>

                <div>
                  <label className={labelStyle}>⭐ Estrellas (1–5)</label>
                  <select name="estrellas" value={formData.estrellas} onChange={handleInputChange} className={inputStyle}>
                    <option value={1}>1</option>
                    <option value={2}>2</option>
                    <option value={3}>3</option>
                    <option value={4}>4</option>
                    <option value={5}>5</option>
                  </select>
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                <div>
                  <label className={labelStyle}>🌡️ Termómetro (1–5)</label>
                  <select name="termometro" value={formData.termometro} onChange={handleInputChange} className={inputStyle}>
                    <option value={1}>1</option>
                    <option value={2}>2</option>
                    <option value={3}>3</option>
                    <option value={4}>4</option>
                    <option value={5}>5</option>
                  </select>
                </div>

                <div>
                  <label className={labelStyle}>🌶️ Spicómetro (1–5)</label>
                  <select name="spicometro" value={formData.spicometro} onChange={handleInputChange} className={inputStyle}>
                    <option value={1}>1</option>
                    <option value={2}>2</option>
                    <option value={3}>3</option>
                    <option value={4}>4</option>
                    <option value={5}>5</option>
                  </select>
                </div>
              </div>
            </div>

            {/* ✅ CATEGORÍA: Notas */}
            <div className={cardStyle}>
              <h3 className="text-lg font-extrabold text-pink-500 mb-4 font-fredoka">📝 Notas</h3>

              <div className="grid grid-cols-1 gap-4">
                <div>
                  <label className={labelStyle}>💬 Mejor Cita</label>
                  <textarea
                    name="cita"
                    value={formData.cita}
                    onChange={handleInputChange}
                    className={`${inputStyle} h-auto min-h-[96px] py-3`}
                    placeholder="Escribe aquí tu cita favorita…"
                  />
                </div>

                <div>
                  <label className={labelStyle}>✨ Reseña</label>
                  <textarea
                    name="resena"
                    value={formData.resena}
                    onChange={handleInputChange}
                    className={`${inputStyle} h-auto min-h-[120px] py-3`}
                    placeholder="¿Qué te gustó? ¿Qué te marcó?"
                  />
                </div>
              </div>
            </div>

            {/* ✅ CATEGORÍA: Organización */}
            <div className={cardStyle}>
              <h3 className="text-lg font-extrabold text-pink-500 mb-4 font-fredoka">🧺 Organización</h3>

              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                  <label className={labelStyle}>📍 Ubicación</label>
                  <input type="text" name="ubicacion" value={formData.ubicacion} onChange={handleInputChange} className={inputStyle} placeholder="Ej: Velador, Kindle..." />
                </div>

                <div>
                  <label className={labelStyle}>🔁 ¿Releerías?</label>
                  <select name="reeleria" value={formData.reeleria} onChange={handleInputChange} className={inputStyle}>
                    <option value="Sí">Sí</option>
                    <option value="No">No</option>
                    <option value="Tal vez">Tal vez</option>
                  </select>
                </div>

                <div>
                  <label className={labelStyle}>📚 Tipo de obra</label>
                  <select name="tipo" value={formData.tipo} onChange={handleInputChange} className={inputStyle}>
                    <option value="Libro">Libro</option>
                    <option value="Fanfic">Fanfic</option>
                  </select>
                </div>
              </div>
            </div>

            {/* ✅ CATEGORÍA: Fanfic (solo si es Fanfic) */}
            {formData.tipo === 'Fanfic' && (
              <div className={cardStyle}>
                <h3 className="text-lg font-extrabold text-purple-600 mb-4 font-fredoka">🪄 Fanfic</h3>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <label className={labelStyle}>🌐 Plataforma</label>
                    <select name="plataforma" value={formData.plataforma} onChange={handleInputChange} className={inputStyle}>
                      <option value="AO3">AO3</option>
                      <option value="Wattpad">Wattpad</option>
                      <option value="FanFiction.net">FanFiction.net</option>
                      <option value="Otra">Otra</option>
                    </select>
                  </div>

                  <div>
                    <label className={labelStyle}>📌 Estado publicación</label>
                    <select name="estadoPub" value={formData.estadoPub} onChange={handleInputChange} className={inputStyle}>
                      <option value="En curso">En curso</option>
                      <option value="Finalizado">Finalizado</option>
                      <option value="Abandonado">Abandonado</option>
                    </select>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
                  <div>
                    <label className={labelStyle}>🧮 Palabras</label>
                    <input type="number" name="palabras" value={formData.palabras} onChange={handleInputChange} className={inputStyle} placeholder="Ej: 120000" />
                  </div>
                  <div>
                    <label className={labelStyle}>🏷️ Trope</label>
                    <input type="text" name="troop" value={formData.troop} onChange={handleInputChange} className={inputStyle} placeholder="Ej: enemies to lovers" />
                  </div>
                  <div>
                    <label className={labelStyle}>🔗 Link</label>
                    <input type="url" name="link" value={formData.link} onChange={handleInputChange} className={inputStyle} placeholder="https://..." />
                  </div>
                </div>
              </div>
            )}

            <button type="submit" className="w-full bg-gradient-to-r from-pink-400 to-rose-400 text-white font-bold py-4 rounded-2xl shadow-lg transform hover:-translate-y-1 font-fredoka text-lg">
              {formData.id ? 'Guardar cambios ✨' : 'Guardar lectura ✨'}
            </button>
          </form>
        </div>
      );
    };

    return (
      <div className="min-h-screen bg-fixed bg-[#fff5f7] bg-[radial-gradient(#ffd1dc_1px,transparent_1px)] [background-size:20px_20px] font-sans text-slate-700 selection:bg-pink-200">

        {mostrarCelebracion && (
          <div className="fixed inset-0 z-50 flex items-center justify-center bg-white/50 backdrop-blur-sm animate-in fade-in duration-300">
            <div className="bg-white p-10 rounded-[3rem] shadow-2xl border-4 border-pink-200 text-center animate-in zoom-in-50">
              <div className="text-6xl mb-4 animate-bounce">🎉🌸</div>
              <h2 className="text-3xl font-extrabold text-pink-500 font-fredoka">¡Listo! 📚✨</h2>
              <p className="text-gray-500 mt-2">Tu lectura quedó guardada.</p>
            </div>
          </div>
        )}

        {lecturaABorrar && (
          <div className="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/40 backdrop-blur-sm">
            <div className="bg-white p-8 rounded-[2rem] max-w-sm w-full mx-4 text-center">
              <h3 className="text-2xl font-bold mb-4 font-fredoka">¿Borrar recuerdo? 🥺</h3>
              <div className="flex gap-3">
                <button onClick={() => setLecturaABorrar(null)} className="flex-1 bg-gray-100 py-3 rounded-xl">No</button>
                <button onClick={confirmarEliminar} className="flex-1 bg-rose-400 text-white py-3 rounded-xl">Sí, borrar</button>
              </div>
            </div>
          </div>
        )}

        <div className="max-w-6xl mx-auto px-4 py-8 md:py-12 relative z-10">
          {vista === 'lista' && renderVistaLista()}
          {vista === 'formulario' && renderVistaFormulario()}
          {vista === 'detalle' && renderVistaDetalle()}
        </div>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>

</body>
</html>
