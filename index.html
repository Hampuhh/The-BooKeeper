<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f472b6">
    <title>The BooKeeper</title>
    
    <link rel="icon" href="osito.png">
    <link rel="apple-touch-icon" href="osito.png">
    <link rel="manifest" href="manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Nunito', 'sans-serif'], 
              fredoka: ['Fredoka', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="antialiased">
    <div class="fixed inset-0 -z-10 bg-[#fff5f7] bg-[radial-gradient(#ffd1dc_1px,transparent_1px)] [background-size:20px_20px]"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ÍCONOS NATIVOS ---
        const IconPlus = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>);
        const IconX = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);
        const IconChevronLeft = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>);
        const IconBookHeart = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path><path d="M16 8.26c-.72-1.3-2.61-1.3-3.33 0l-.67 1.2-.67-1.2c-.72-1.3-2.61-1.3-3.33 0s-.65 2.7.35 4.04l3.65 4.7 3.65-4.7c1-1.34 1.07-2.74.35-4.04z"></path></svg>);
        const IconLibrary = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"></path><path d="M18 14h-8"></path><path d="M15 18h-5"></path><path d="M10 6h8v4h-8V6Z"></path></svg>);
        const IconSparkles = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>);
        const IconCheck = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>);
        const IconEdit2 = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>);
        const IconExternalLink = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>);
        const IconTrash = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>);

        const IMAGEN_OSITO = "osito.png";

        const estadoInicialFormulario = {
          titulo: '', autor: '', genero: '', fechaInicio: '', fechaFin: '', dias: '', formato: 'Físico',
          puntaje: '', estrellas: 3, resena: '', tipo: 'Libro', cita: '', termometro: 3,
          ubicacion: '', reeleria: 'Sí', spicometro: 1,
          plataforma: 'AO3', estadoPub: 'En curso', palabras: '', troop: '', link: ''
        };

        function App() {
          // CARGAR DATOS PERSISTENTES
          const [lecturas, setLecturas] = useState(() => {
            const save = localStorage.getItem('bk_data');
            return save ? JSON.parse(save) : [];
          });
          const [vista, setVista] = useState('lista'); 
          const [lecturaActual, setLecturaActual] = useState(null);
          const [formData, setFormData] = useState(estadoInicialFormulario);

          const [metaLectura, setMetaLectura] = useState(() => {
            const saveMeta = localStorage.getItem('bk_meta');
            return saveMeta ? parseInt(saveMeta) : 20;
          });
          const [editandoMeta, setEditandoMeta] = useState(false);
          const [mostrarCelebracion, setMostrarCelebracion] = useState(false);
          const [lecturaABorrar, setLecturaABorrar] = useState(null);

          // GUARDAR CAMBIOS AUTOMÁTICAMENTE
          useEffect(() => { localStorage.setItem('bk_data', JSON.stringify(lecturas)); }, [lecturas]);
          useEffect(() => { localStorage.setItem('bk_meta', metaLectura.toString()); }, [metaLectura]);

          useEffect(() => {
            if (formData.fechaInicio && formData.fechaFin) {
              const inicio = new Date(formData.fechaInicio);
              const fin = new Date(formData.fechaFin);
              const diferenciaTiempo = fin.getTime() - inicio.getTime();
              const diferenciaDias = Math.ceil(diferenciaTiempo / (1000 * 3600 * 24));
              if (diferenciaDias >= 0) setFormData(prev => ({ ...prev, dias: diferenciaDias }));
            }
          }, [formData.fechaInicio, formData.fechaFin]);

          const handleInputChange = (e) => {
            const { name, value } = e.target;
            setFormData(prev => ({ ...prev, [name]: value }));
          };

          const guardarLectura = (e) => {
            e.preventDefault();
            if (formData.id) {
              setLecturas(lecturas.map(l => l.id === formData.id ? formData : l));
              if (lecturaActual && lecturaActual.id === formData.id) setLecturaActual(formData);
            } else {
              const nuevaLectura = { ...formData, id: Date.now() };
              setLecturas([nuevaLectura, ...lecturas]);
            }
            setVista('lista');
            setFormData(estadoInicialFormulario);
            setMostrarCelebracion(true);
            setTimeout(() => setMostrarCelebracion(false), 3500);
          };

          const confirmarEliminar = () => {
            if (lecturaABorrar) {
              setLecturas(lecturas.filter(l => l.id !== lecturaABorrar.id));
              setLecturaABorrar(null);
              setVista('lista');
            }
          };

          const renderizarEstrellas = (cantidad, icono = "⭐") => {
            return Array.from({ length: 5 }).map((_, i) => (
              <span key={i} className={`text-xl ${i < cantidad ? 'opacity-100' : 'opacity-30 grayscale'}`}>{icono}</span>
            ));
          };

          const renderizarTermometro = (valor) => {
            const caritas = ['😱', '😩', '😐', '😊', '😍']; // CAMBIADO: 😍 al final
            return caritas.map((carita, i) => (
              <span key={i} className={`text-2xl transition-all duration-300 inline-block mx-0.5 ${i + 1 === parseInt(valor || 0) ? 'opacity-100 transform scale-125 drop-shadow-md' : 'opacity-30 grayscale scale-90'}`}>{carita}</span>
            ));
          };

          const renderVistaLista = () => {
            const estiloOsito = { animationDuration: '3s' };
            const estiloProgreso = { width: Math.min(100, (lecturas.length / metaLectura) * 100) + '%' };
            return (
              <div className="space-y-6 pb-24">
                <div className="flex flex-col md:flex-row justify-between items-center mb-8 bg-white/60 p-6 rounded-3xl shadow-sm backdrop-blur-md border border-pink-100 gap-4">
                  <div className="w-full md:w-auto">
                    <div className="flex items-end gap-3 mb-2">
                      <img src={IMAGEN_OSITO} alt="Osito" className="w-16 h-16 md:w-20 md:h-20 object-contain drop-shadow-md animate-bounce" style={estiloOsito} />
                      <h1 className="text-3xl font-extrabold text-pink-500 flex items-center gap-2 pb-2 font-fredoka">
                        <IconLibrary size={28} className="text-pink-400" /> The BooKeeper 🌸
                      </h1>
                    </div>
                    <div className="mt-4 bg-white/50 p-4 rounded-2xl border border-pink-50 w-full md:min-w-[300px]">
                      <div className="flex justify-between items-center mb-2">
                        <span className="text-sm font-bold text-gray-500 flex items-center gap-1 font-fredoka">
                          Meta Anual 🎯 {!editandoMeta && <button onClick={() => setEditandoMeta(true)} className="text-pink-400 p-1"><IconEdit2 size={14} /></button>}
                        </span>
                        {editandoMeta ? (
                          <div className="flex items-center gap-2">
                            <input type="number" value={metaLectura} onChange={(e) => setMetaLectura(Math.max(1, parseInt(e.target.value) || 1))} className="w-16 text-center border border-pink-200 rounded-lg text-sm p-1 focus:ring-2 focus:ring-pink-300" autoFocus />
                            <button onClick={() => setEditandoMeta(false)} className="text-green-500"><IconCheck size={16}/></button>
                          </div>
                        ) : <span className="text-sm font-bold text-pink-500 bg-pink-50 px-2 py-1 rounded-md">{lecturas.length} / {metaLectura}</span>}
                      </div>
                      <div className="w-full bg-gray-200 rounded-full h-3 overflow-hidden shadow-inner">
                        <div className="bg-gradient-to-r from-pink-300 to-pink-500 h-3 rounded-full transition-all duration-1000" style={estiloProgreso}></div>
                      </div>
                    </div>
                  </div>
                  <button onClick={() => { setFormData(estadoInicialFormulario); setVista('formulario'); }} className="bg-pink-400 hover:bg-pink-500 text-white p-4 rounded-2xl shadow-lg transform hover:-translate-y-1"><IconPlus size={24} /></button>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 font-sans">
                  {lecturas.map(lectura => (
                    <div key={lectura.id} onClick={() => abrirDetalle(lectura)} className="bg-white/70 hover:bg-white backdrop-blur-sm rounded-3xl p-6 shadow-sm border border-pink-100 cursor-pointer transition-all transform hover:-translate-y-1">
                      <div className="flex justify-between items-start mb-3">
                        <span className={`px-3 py-1 rounded-full text-xs font-bold uppercase ${lectura.tipo === 'Fanfic' ? 'bg-purple-100 text-purple-600' : 'bg-green-100 text-green-600'}`}>{lectura.tipo}</span>
                        <span className="flex">{renderizarEstrellas(lectura.estrellas)}</span>
                      </div>
                      <h3 className="text-xl font-bold text-gray-800 mb-1 font-fredoka">{lectura.titulo}</h3>
                      <p className="text-gray-500 text-sm mb-4">👤 {lectura.autor}</p>
                      <div className="flex flex-wrap gap-2 text-xs">
                        <span className="bg-pink-50 px-2 py-1 rounded-lg">📑 {lectura.genero}</span>
                        <span className="bg-pink-50 px-2 py-1 rounded-lg">✨ {lectura.puntaje}/10</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          };

          const renderVistaDetalle = () => {
            if (!lecturaActual) return null;
            const styleFila = "flex justify-between items-center text-sm py-2 border-b border-pink-50 last:border-0";
            return (
              <div className="max-w-3xl mx-auto pb-12 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div className="flex justify-between items-center mb-6 font-fredoka">
                  <button onClick={() => setVista('lista')} className="flex items-center text-pink-500 font-medium bg-white/50 px-4 py-2 rounded-full shadow-sm"><IconChevronLeft size={20} className="mr-1" /> Volver</button>
                  <div className="flex gap-2">
                    <button onClick={() => setLecturaABorrar(lecturaActual)} className="text-rose-400 bg-rose-50 px-4 py-2 rounded-full shadow-sm"><IconTrash size={16} /></button>
                    <button onClick={() => { setFormData(lecturaActual); setVista('formulario'); }} className="text-pink-500 bg-pink-100 px-5 py-2 rounded-full shadow-sm">Editar</button>
                  </div>
                </div>
                <div className="bg-white/80 backdrop-blur-md rounded-[2.5rem] p-8 md:p-10 shadow-xl border border-pink-100 relative">
                  <div className="flex flex-col md:flex-row gap-6 items-start mb-8">
                    <div className="w-24 h-32 bg-gradient-to-br from-pink-300 to-purple-300 rounded-2xl shadow-md flex items-center justify-center transform -rotate-3 border-4 border-white"><IconBookHeart size={40} className="text-white" /></div>
                    <div>
                      <h2 className="text-3xl md:text-4xl font-extrabold text-gray-800 mb-2 font-fredoka">{lecturaActual.titulo}</h2>
                      <p className="text-xl text-gray-500 font-medium font-fredoka">👤 {lecturaActual.autor}</p>
                    </div>
                  </div>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 font-fredoka text-center">
                    <div className="bg-pink-50 rounded-2xl p-4">⭐ Estrellas <div className="flex justify-center">{renderizarEstrellas(lecturaActual.estrellas)}</div></div>
                    <div className="bg-pink-50 rounded-2xl p-4">✨ Puntaje <p className="text-xl font-bold">{lecturaActual.puntaje}</p></div>
                    <div className="bg-pink-50 rounded-2xl p-4">🌡️ Sentir <div className="flex justify-center">{renderizarTermometro(lecturaActual.termometro)}</div></div>
                    <div className="bg-pink-50 rounded-2xl p-4">🌶️ Spice <div className="flex justify-center">{renderizarEstrellas(lecturaActual.spicometro, "🌶️")}</div></div>
                  </div>
                  {lecturaActual.cita && (
                    <div className="bg-pink-50 rounded-2xl p-6 mb-8 text-center italic text-gray-700">"{lecturaActual.cita}"<p className="text-right text-xs font-bold font-fredoka mt-2">✒️ Mejor Cita</p></div>
                  )}
                  <div className="space-y-6">
                    <div><h3 className="text-sm font-bold text-pink-400 font-fredoka mb-2 flex items-center gap-2"><IconSparkles size={16} className="text-pink-400" /> Reseña</h3><p className="bg-white/50 p-5 rounded-2xl border border-pink-50 italic">{lecturaActual.resena || "Sin reseña... 🍵"}</p></div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 font-sans">
                      <div className="bg-white/50 p-5 rounded-2xl border border-pink-50">
                        <h3 className="text-xs font-bold text-gray-400 mb-2 border-b border-pink-100 pb-2 font-fredoka">Detalles Generales</h3>
                        <div className={styleFila}><span>📑 Género:</span> <b>{lecturaActual.genero}</b></div>
                        <div className={styleFila}><span>📱 Formato:</span> <b>{lecturaActual.formato}</b></div>
                        <div className={styleFila}><span>🌍 Ubicación:</span> <b>{lecturaActual.ubicacion}</b></div>
                        <div className={styleFila}><span>🔁 ¿Reelería?:</span> <b>{lecturaActual.reeleria}</b></div>
                      </div>
                      <div className="bg-white/50 p-5 rounded-2xl border border-pink-50">
                        <h3 className="text-xs font-bold text-gray-400 mb-2 border-b border-pink-100 pb-2 font-fredoka">Tiempos</h3>
                        <div className={styleFila}><span>📅 Inicio:</span> <b>{lecturaActual.fechaInicio}</b></div>
                        <div className={styleFila}><span>🏁 Fin:</span> <b>{lecturaActual.fechaFin}</b></div>
                        <div className={styleFila}><span>⏳ Total:</span> <b className="bg-pink-100 px-2 rounded">{lecturaActual.dias} días</b></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          };

          const renderVistaFormulario = () => {
            const inputStyle = "w-full bg-white/60 border border-pink-200 rounded-xl px-4 py-3 text-gray-700 font-sans";
            const inputFecha = "w-full bg-white/60 border border-pink-200 rounded-xl px-2 py-3 text-xs text-gray-700 font-sans";
            const labelStyle = "block text-sm font-bold text-gray-600 mb-1 ml-1 font-fredoka";
            return (
              <div className="max-w-3xl mx-auto pb-12 animate-in fade-in slide-in-from-bottom-8 duration-500">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-3xl font-extrabold text-pink-500 font-fredoka flex items-center gap-2"><IconSparkles size={28} className="text-pink-400" /> {formData.id ? 'Editando 🍡' : 'Set? Ready...Go! 🍡'}</h2>
                  <button onClick={() => setVista('lista')} className="bg-white p-2 rounded-full text-pink-400 shadow-sm"><IconX size={24} /></button>
                </div>
                <form onSubmit={guardarLectura} className="bg-white/80 backdrop-blur-md rounded-[2.5rem] p-8 md:p-10 shadow-xl border border-pink-100 space-y-8">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label className={labelStyle}>📖 Título</label><input required name="titulo" value={formData.titulo} onChange={handleInputChange} className={inputStyle} /></div>
                    <div><label className={labelStyle}>👤 Autor</label><input required name="autor" value={formData.autor} onChange={handleInputChange} className={inputStyle} /></div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div><label className={labelStyle}>📅 Inicio</label><input type="date" name="fechaInicio" value={formData.fechaInicio} onChange={handleInputChange} className={inputFecha} /></div>
                    <div><label className={labelStyle}>🏁 Fin</label><input type="date" name="fechaFin" value={formData.fechaFin} onChange={handleInputChange} className={inputFecha} /></div>
                    <div><label className={labelStyle}>⏳ Días</label><input readOnly value={formData.dias} className={inputFecha} /></div>
                  </div>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-6 text-center">
                    <div><label className={labelStyle}>⭐ Estrellas</label><input type="range" min="1" max="5" name="estrellas" value={formData.estrellas} onChange={handleInputChange} className="w-full accent-yellow-400" /></div>
                    <div><label className={labelStyle}>🌡️ Sentir</label><input type="range" min="1" max="5" name="termometro" value={formData.termometro} onChange={handleInputChange} className="w-full accent-pink-400" /><div className="mt-1">{renderizarTermometro(formData.termometro)}</div></div>
                    <div><label className={labelStyle}>🌶️ Spice</label><input type="range" min="1" max="5" name="spicometro" value={formData.spicometro} onChange={handleInputChange} className="w-full accent-red-400" /></div>
                    <div><label className={labelStyle}>✨ Puntaje</label><input type="number" step="0.1" name="puntaje" value={formData.puntaje} onChange={handleInputChange} className={inputStyle} placeholder="10" /></div>
                  </div>
                  <div><label className={labelStyle}>Mejor Cita ✒️</label><textarea name="cita" value={formData.cita} onChange={handleInputChange} rows="2" className={inputStyle} /></div>
                  <div><label className={labelStyle}>✍️ Reseña</label><textarea name="resena" value={formData.resena} onChange={handleInputChange} rows="3" className={inputStyle} /></div>
                  <button type="submit" className="w-full bg-gradient-to-r from-pink-400 to-rose-400 text-white font-bold py-4 rounded-2xl shadow-lg font-fredoka text-xl transform hover:-translate-y-1">¡Anotar en mi Biblioteca! ✨</button>
                </form>
              </div>
            );
          };

          return (
            <div className="relative z-10 font-sans text-slate-700 selection:bg-pink-200">
              <div className="max-w-6xl mx-auto px-4 py-8 md:py-12">
                {vista === 'lista' && renderVistaLista()}
                {vista === 'formulario' && renderVistaFormulario()}
                {vista === 'detalle' && renderVistaDetalle()}
              </div>
              {mostrarCelebracion && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-white/50 backdrop-blur-sm">
                  <div className="bg-white p-10 rounded-[3rem] shadow-2xl border-4 border-pink-200 text-center font-fredoka animate-bounce">
                    <div className="text-6xl mb-4">🎉🌸</div>
                    <h2 className="text-3xl text-pink-500">¡Aventura Guardada!</h2>
                  </div>
                </div>
              )}
              {lecturaABorrar && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/40 backdrop-blur-sm font-fredoka">
                  <div className="bg-white p-8 rounded-[2rem] text-center max-w-sm w-full mx-4">
                    <h3 className="text-2xl mb-4">¿Borrar recuerdo? 🥺</h3>
                    <div className="flex gap-3"><button onClick={() => setLecturaABorrar(null)} className="flex-1 bg-gray-100 py-3 rounded-xl font-bold">No</button><button onClick={confirmarEliminar} className="flex-1 bg-rose-400 text-white py-3 rounded-xl font-bold">Sí, borrar</button></div>
                  </div>
                </div>
              )}
            </div>
          );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
